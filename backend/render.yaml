services:
  - type: web
    name: growthpilot-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false          # Set this manually in Render dashboard → Environment
      - key: GEMINI_API_KEY
        sync: false          # Set this manually in Render dashboard → Environment
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://growthpilot.vercel.app
    healthCheckPath: /health
